// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx(){
  try{if(!audioCtx)audioCtx=new AudioCtx();return audioCtx}catch(e){console.warn("Audio context failed:",e);return null}
}
function playDing(){
  try{
    const c=getAudioCtx();if(!c)return;
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=880;g.gain.value=0.3;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);o.stop(c.currentTime+0.5)
  }catch(e){console.warn("Ding failed:",e)}
}
function playBuzz(){
  try{
    const c=getAudioCtx();if(!c)return;
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=150;g.gain.value=0.15;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3)
  }catch(e){console.warn("Buzz failed:",e)}
}
function speakWord(word){
  try{
    if(!window.speechSynthesis)return;
    const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.85;speechSynthesis.speak(u)
  }catch(e){console.warn("Speech failed:",e)}
}

// ===== CONFETTI =====
function showConfetti(big=false){
  const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
  const count=big?70:32;
  const colors=['#FFAFCC','#457B9D','#A8DADC','#FFD700','#FF6B6B','#9b5de5','#00bbf9'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    const size=4+Math.random()*8;
    const shape=Math.random()>0.5?'50%':'2px';
    const dur=(1.2+Math.random()*1.8).toFixed(2);
    const rot=Math.floor(Math.random()*720-360);
    p.style.cssText=`position:fixed;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${shape};left:${Math.random()*100}%;top:-10px;z-index:9999;--rot:${rot}deg;animation:confettiFall ${dur}s cubic-bezier(.25,.46,.45,.94) forwards`;
    c.appendChild(p)
  }
  if(!document.getElementById('confettiKeyframes')){
    const s=document.createElement('style');s.id='confettiKeyframes';
    s.textContent='@keyframes confettiFall{to{top:100%;opacity:0;transform:translateX(calc((var(--rot,180) / 360) * 60px)) rotate(var(--rot,180deg))}}';
    document.head.appendChild(s);
  }
  setTimeout(()=>{c.remove()},3000)
}

// ===== TOAST =====
function showToast(msg,type='success'){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';
  t.style.background=type==='success'?'var(--success)':'var(--error)';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)
}

function startGame(part){
  currentGame=part;currentQ=0;score=0;answered=false;
  if(part===1)generateMC();
  else if(part===2)generateFIB();
  else if(part===3)generateMixed();
  else if(part===4)generateMaster();
  currentScreen='game';render();
}

// ===== PART 1: MULTIPLE CHOICE =====
function generateMC(){
  gameQuestions=shuffle(VOCAB).map(v=>{
    const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
    const opts=shuffle([v,...wrongs]);
    return{type:'mc',vocab:v,options:opts,correctId:v.id};
  });
}

// ===== PART 2: FILL IN BLANK =====
function generateFIB(){
  gameQuestions=shuffle(VOCAB).map(v=>({type:'fib',vocab:v}));
}

// ===== PART 3: MIXED =====
function generateMixed(){
  const all=shuffle(VOCAB);
  gameQuestions=[];
  all.forEach((v,i)=>{
    const mode=i%4;
    if(mode===0){
      const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
      const opts=shuffle([v,...wrongs]);
      gameQuestions.push({type:'mc',vocab:v,options:opts,correctId:v.id});
    }else if(mode===1){
      gameQuestions.push({type:'fib',vocab:v});
    }else if(mode===2){
      gameQuestions.push({type:'sentence',vocab:v});
    }else{
      const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
      const opts=shuffle([v,...wrongs]);
      gameQuestions.push({type:'mc_reverse',vocab:v,options:opts,correctId:v.id});
    }
  });
}

// ===== PART 4: MASTER =====
function generateMaster(){
  const all=shuffle(VOCAB);
  gameQuestions=[];
  all.forEach((v,i)=>{
    const mode=i%2;
    if(mode===0){
      const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
      const opts=shuffle([v,...wrongs]);
      gameQuestions.push({type:'master_mc',vocab:v,options:opts,correctId:v.id});
    }else{
      gameQuestions.push({type:'sentence',vocab:v});
    }
  });
}

function renderGame(app){
  if(currentQ>=gameQuestions.length){
    const pct=Math.round(score/gameQuestions.length*100);
    progress[`p${currentGame}`]=Math.max(progress[`p${currentGame}`],pct);
    saveProgress();
    currentScreen='result';render();return;
  }
  const q=gameQuestions[currentQ];
  const titles=['','🔵 Multiple Choice','🟡 Fill in the Blank','🟣 Mixed Mode','🔴 Master Test'];
  app.innerHTML=`
  <div class="min-h-full p-4 fade-in">
    <div class="max-w-lg mx-auto">

      <p class="text-sm" style="color:var(--accent)">💡 Nghĩa: ${q.vocab.vi}</p>
    </div>
    <div class="flex gap-2">
      <input id="fibInput" class="input-field flex-1" placeholder="Nhập từ..." autocomplete="off" onkeydown="if(event.key==='Enter')checkSentence()">
      <button onclick="checkSentence()" class="btn-primary">Kiểm tra</button>
    </div>`;
    setTimeout(()=>{const inp=document.getElementById('fibInput');if(inp)inp.focus()},100);
  }else if(q.type==='master_mc'){
    area.innerHTML=`
    <div class="rounded-2xl p-5 mb-4" style="background:#fff">
      <div class="flex items-center gap-2 mb-3">
        <span class="tag master-glow" style="background:#FFD700;color:#000;font-weight:bold">⭐ MASTER MODE</span>
        <span class="text-xs font-600" style="color:var(--error)">HARD</span>
      </div>
      <p class="text-sm opacity-70 mb-3">📖 Read the definition and guess the phrase:</p>
      <div class="rounded-xl p-4 mb-4" style="background:#f9f3e8;border-left:4px solid var(--accent)">
        <p class="font-700 text-lg leading-relaxed" style="color:var(--dark)">${q.vocab.enDef}</p>
      </div>
      <p class="text-xs opacity-60">Choose the correct English word/phrase:</p>
    </div>
    <div class="space-y-3" id="optionsArea">
      ${q.options.map((o,i)=>`<button class="option-btn" onclick="checkMC(${q.correctId},${o.id},this)">${String.fromCharCode(65+i)}. ${o.en}</button>`).join('')}
    </div>`;
  }
  lucide.createIcons();
}

function bumpScore(){
  score++;
  const tag=document.getElementById('scoreTag');
  if(tag){tag.textContent=`Score: ${score}/${currentQ}`;tag.classList.remove('score-pop');void tag.offsetWidth;tag.classList.add('score-pop');}
}

function checkMC(correctId,chosenId,btn){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>{b.style.pointerEvents='none';});
  if(chosenId===correctId){
    btn.classList.add('correct');bumpScore();playDing();showConfetti();
    showToast('✅ Chính xác!','success');
  }else{
    btn.classList.add('wrong');playBuzz();
    btns.forEach(b=>{if(b.textContent.includes(VOCAB.find(v=>v.id===correctId).en))b.classList.add('correct')});
    showToast('❌ Sai rồi!','error');
  }
  showExplanation(gameQuestions[currentQ].vocab);showNextBtn();
}

function checkFIB(){
  if(answered)return;
  const inp=document.getElementById('fibInput');
  const val=inp.value.trim().toLowerCase();
  const q=gameQuestions[currentQ];
  const correct=q.vocab.en.toLowerCase();
  const alts=[correct];
  answered=true;
  if(alts.some(a=>val===a||val===a.replace(/\s+/g,' '))||correct.includes(val)&&val.length>3){
    inp.style.borderColor='var(--success)';inp.style.background='#d4edda';bumpScore();playDing();showConfetti();
    showToast('✅ Chính xác!','success');
  }else{
    inp.style.borderColor='var(--error)';inp.style.background='#f8d7da';playBuzz();
    showToast(`Đáp án: ${q.vocab.en}`,'error');
  }
  showExplanation(q.vocab);showNextBtn();
}

function checkSentence(){
  if(answered)return;
  const inp=document.getElementById('fibInput');
  const val=inp.value.trim().toLowerCase();
  const q=gameQuestions[currentQ];
  const word=q.vocab.en.toLowerCase().split('/')[0].trim();
  const words=[word];
  answered=true;
  if(words.some(w=>val===w||val.includes(w)&&val.length>3)){
    inp.style.borderColor='var(--success)';inp.style.background='#d4edda';bumpScore();playDing();showConfetti();
    showToast('✅ Chính xác!','success');
  }else{
    inp.style.borderColor='var(--error)';inp.style.background='#f8d7da';playBuzz();
    showToast(`Đáp án: ${q.vocab.en}`,'error');
  }
  showExplanation(q.vocab);showNextBtn();
}

function showNextBtn(){
  document.getElementById('nextBtnArea').innerHTML=`<button onclick="nextQuestion()" class="btn-primary text-lg px-8 next-btn-enter">Câu tiếp theo →</button>`;
}

function nextQuestion(){
  const area=document.getElementById('questionArea');
  if(area){area.style.transition='opacity .15s ease, transform .15s ease';area.style.opacity='0';area.style.transform='translateX(-20px)';}
  setTimeout(()=>{currentQ++;answered=false;renderGame(document.getElementById('app'));},150);
}

function showExplanation(v){
  document.getElementById('explanationArea').innerHTML=`
  <div class="rounded-2xl p-5 fade-in" style="background:#f0f8ff;border:2px solid #d0e8f0">
    <div class="flex items-center gap-2 mb-4">
      <span class="font-700 text-lg" style="color:var(--accent)">📖 Deep Dive: Chi tiết từ vựng</span>
      <button onclick="speakWord('${v.en.replace(/'/g,"\\'")}')" class="p-1 rounded-full icon-spin" style="background:var(--pink);transition:transform .2s ease"><i data-lucide="volume-2" style="width:14px;height:14px"></i></button>
    </div>

    <!-- WORD HEADER -->
    <div class="p-4 rounded-xl mb-4" style="background:linear-gradient(135deg,#457B9D15 0%,#FFAFCC15 100%);border:1px solid var(--accent)">
      <p class="font-800 text-xl" style="color:var(--dark)">${v.en}</p>
      <p class="text-xs opacity-70 mt-1">${v.ipa} <span class="tag" style="background:var(--accent);color:#fff">${v.pos}</span></p>
    </div>

    <!-- MEANING -->
    <div class="mb-4">
      <p class="text-sm font-700 mb-2" style="color:#fff;background:var(--accent);padding:8px 12px;border-radius:8px;display:inline-block">🟢 MEANING (Nghĩa)</p>
      <div class="mt-3 space-y-2">
        <div class="p-3 rounded-lg" style="background:#fff;border-left:4px solid #28a745">
          <p class="text-xs opacity-60 mb-1">🇻🇳 Tiếng Việt:</p>
          <p class="font-600" style="color:var(--dark)">${v.vi}</p>
        </div>
        <div class="p-3 rounded-lg" style="background:#fff;border-left:4px solid #007bff">
          <p class="text-xs opacity-60 mb-1">🇬🇧 English Definition:</p>
          <p class="text-sm leading-relaxed">${v.enDef}</p>
        </div>
      </div>
    </div>

    <!-- COLLOCATIONS -->
    <div class="mb-4 p-3 rounded-lg" style="background:#fff;border:1px solid #ffc107">
      <p class="text-sm font-700 mb-2" style="color:#856404">🔗 COLLOCATIONS - Kết hợp từ thường gặp</p>
      <div class="space-y-2">
        ${v.collocations.map((col,i)=>`<div class="text-sm"><span style="background:var(--bg);padding:2px 8px;border-radius:6px;font-weight:600">${col}</span> <span style="opacity:.7">${v.collocationVi[i]}</span></div>`).join('')}
      </div>
    </div>

    <!-- SYNONYMS -->
    <div class="mb-4 p-3 rounded-lg" style="background:#fff;border:1px solid #17a2b8">
      <p class="text-sm font-700 mb-2" style="color:#0c5460">↔️ SYNONYMS - Từ đồng nghĩa</p>
      <div class="space-y-2">
        ${v.synonyms.map((syn,i)=>`<div class="text-sm"><span style="background:#e2f4f8;padding:2px 8px;border-radius:6px;font-weight:600">${syn}</span> <span style="opacity:.7">${v.synonymsVi[i]}</span></div>`).join('')}
      </div>
    </div>

    <!-- ANTONYMS -->
    <div class="mb-4 p-3 rounded-lg" style="background:#fff;border:1px solid #dc3545">
      <p class="text-sm font-700 mb-2" style="color:#721c24">⚖️ ANTONYMS - Từ trái nghĩa</p>
      <div class="space-y-2">
        ${v.antonyms.map((ant,i)=>`<div class="text-sm"><span style="background:#f8d7da;padding:2px 8px;border-radius:6px;font-weight:600">${ant}</span> <span style="opacity:.7">${v.antonymsVi[i]}</span></div>`).join('')}
      </div>
    </div>

    <!-- WORD FAMILY -->
    <div class="mb-4 p-3 rounded-lg" style="background:#fff;border:1px solid #6f42c1">
      <p class="text-sm font-700 mb-2" style="color:#3e1f47">👨‍👩‍👧 WORD FAMILY - Họ từ liên quan</p>
      <div class="space-y-2">
        ${v.wordFamily.map((wf,i)=>`<div class="text-sm"><span style="background:#e7d4f5;padding:2px 8px;border-radius:6px;font-weight:600">${wf}</span> <span style="opacity:.7">${v.wordFamilyVi[i]}</span></div>`).join('')}
      </div>
    </div>

    <!-- USAGE (if available) -->
    ${v.usage?`<div class="mb-4 p-3 rounded-lg" style="background:#fff;border:1px solid var(--accent)">
      <p class="text-sm font-700 mb-2" style="color:var(--dark)">💡 USAGE - Cách dùng</p>
      <p class="text-sm p-2 rounded" style="background:#f9f9f9;color:var(--dark)">${v.usage}</p>
    </div>`:''}

    <!-- EXAMPLE -->
    <div class="p-4 rounded-lg" style="background:#fff3cd;border:2px solid #ffc107">
      <p class="text-sm font-700 mb-3" style="color:#856404">📝 REAL-WORLD EXAMPLE - Ví dụ thực tế</p>
      <div class="mb-3 p-3 rounded" style="background:#fff;border-left:4px solid #ffc107">
        <p class="text-sm italic font-600 mb-2" style="color:var(--dark)">English:</p>
        <p class="text-sm leading-relaxed">${v.example}</p>
      </div>
      <div class="p-3 rounded" style="background:#fff;border-left:4px solid var(--accent)">
        <p class="text-sm italic font-600 mb-2" style="color:var(--dark)">Tiếng Việt:</p>
        <p class="text-sm leading-relaxed" style="color:var(--accent)">${v.exampleVi}</p>
      </div>
    </div>
  </div>`;
  lucide.createIcons();
}

function renderResult(app){
  const total=gameQuestions.length;
  const pct=Math.round(score/total*100);
  const emoji=pct>=80?'🏆':pct>=60?'👍':pct>=40?'💪':'📖';
  const msg=pct>=80?'Xuất sắc!':pct>=60?'Khá tốt!':pct>=40?'Cần ôn thêm!':'Hãy cố gắng hơn!';
  if(pct>=80)showConfetti(true);
  app.innerHTML=`
  <div class="flex flex-col items-center justify-center min-h-full p-6 fade-in">
    <div class="text-6xl mb-4 bounce-in">${emoji}</div>
    <h2 class="text-3xl font-800 mb-2" style="color:var(--dark)">${msg}</h2>
    <p class="text-lg mb-6 opacity-70">Điểm: ${score}/${total} (${pct}%)</p>
    <div class="w-full max-w-xs mb-6"><div class="progress-bar" style="height:12px"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    <div class="space-y-3 w-full max-w-xs">
      <button onclick="startGame(${currentGame})" class="btn-primary w-full">🔄 Chơi lại</button>
      <button onclick="currentScreen='home';render()" class="btn-pink w-full">🏠 Về trang chủ</button>
    </div>
  </div>`;
}

// ===== VOCAB LIST =====
function renderVocabList(app){
  app.innerHTML=`
  <div class="min-h-full p-4 fade-in">
    <div class="max-w-2xl mx-auto">
      <div class="flex items-center gap-3 mb-4">
        <button onclick="currentScreen='home';render()" class="p-2 rounded-lg" style="background:#fff"><i data-lucide="arrow-left" style="width:20px;height:20px"></i></button>
        <h2 class="text-xl font-700" style="color:var(--dark)">📘 Từ vựng đầy đủ (${VOCAB.length} từ)</h2>
      </div>
      <input id="vocabSearch" class="input-field mb-4" placeholder="🔍 Tìm kiếm từ vựng..." oninput="filterVocab(this.value)">
      <div id="vocabContainer">${renderVocabCards(VOCAB)}</div>
    </div>
  </div>`;
  lucide.createIcons();
}

function renderVocabCards(list){
  return list.map((v,idx)=>`
  <div class="vocab-card card-hover fade-in" style="animation-delay:${Math.min(idx*0.04,0.6)}s">
    <div class="flex items-start justify-between mb-2">
      <div>
        <span class="font-700 text-lg" style="color:var(--dark)">${v.en}</span>
        <span class="ml-2 text-sm opacity-60">${v.ipa}</span>
        <span class="tag ml-2" style="background:var(--bg)">${v.pos}</span>
      </div>
      <button onclick="speakWord('${v.en.replace(/'/g,"\\'")}')" class="p-1 rounded-full flex-shrink-0" style="background:var(--pink)"><i data-lucide="volume-2" style="width:16px;height:16px"></i></button>
    </div>
    <p class="font-600 mb-1" style="color:var(--accent)">${v.vi}</p>
    <p class="text-sm opacity-70 mb-2">${v.enDef}</p>
    ${v.usage?`<p class="text-sm mb-2" style="color:var(--accent)">💡 ${v.usage}</p>`:''}
    <details class="mt-2">
      <summary class="text-sm font-600 cursor-pointer" style="color:var(--accent)">Xem chi tiết ▾</summary>
      <div class="mt-2 space-y-1 text-sm pl-2" style="border-left:2px solid var(--bg)">
        <p><strong>Collocations:</strong> ${v.collocations.join(', ')}</p>
        <p><strong>Synonyms:</strong> ${v.synonyms.join(', ')}</p>
        <p><strong>Antonyms:</strong> ${v.antonyms.join(', ')}</p>
        <p><strong>Word family:</strong> ${v.wordFamily.join(', ')}</p>
        <p class="mt-1 p-2 rounded-lg" style="background:#f8f9fa"><strong>Example:</strong> ${v.example}</p>
        <p class="p-2 rounded-lg" style="background:#f0f8ff;color:var(--accent)"><strong>Dịch:</strong> ${v.exampleVi}</p>
      </div>
    </details>
  </div>`).join('');
}

function filterVocab(term){
  const t=term.toLowerCase();
  const filtered=VOCAB.filter(v=>v.en.toLowerCase().includes(t)||v.vi.toLowerCase().includes(t)||v.enDef.toLowerCase().includes(t));
  document.getElementById('vocabContainer').innerHTML=renderVocabCards(filtered);
  lucide.createIcons();
}

// ===== START =====
render();
  </script>
 </body>
</html>
